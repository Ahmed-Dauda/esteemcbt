name: Deploy to Hetzner

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /var/www/esteemcbt

            # Save last working commit
            LAST_WORKING=$(git rev-parse HEAD)
            echo $LAST_WORKING > /tmp/esteemcbt_last_working

            # Pull new code
            git fetch origin
            git reset --hard origin/development
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput 2>&1 | tee /tmp/esteemcbt_deploy.log
            python manage.py collectstatic --noinput 2>&1 | tee -a /tmp/esteemcbt_deploy.log
            systemctl restart esteemcbt
            sleep 15

            # Check services
            ERRORS=""
            systemctl is-active --quiet esteemcbt || ERRORS="$ERRORS\n❌ esteemcbt (web) is DOWN"
            systemctl is-active --quiet esteemcbt-celery || ERRORS="$ERRORS\n❌ esteemcbt-celery is DOWN"
            systemctl is-active --quiet esteemcbt-celerybeat || ERRORS="$ERRORS\n❌ esteemcbt-celerybeat is DOWN"
            systemctl is-active --quiet redis || ERRORS="$ERRORS\n❌ Redis is DOWN"

            if [ -z "$ERRORS" ]; then
              echo "Deploy successful"
              # Get last 10 lines of app log for success email
              journalctl -u esteemcbt -n 10 --no-pager > /tmp/esteemcbt_success.log
            else
              echo "Deploy failed - rolling back"
              # Capture error logs
              journalctl -u esteemcbt -n 20 --no-pager >> /tmp/esteemcbt_deploy.log
              echo -e "$ERRORS" >> /tmp/esteemcbt_deploy.log
              git reset --hard $LAST_WORKING
              systemctl restart esteemcbt
              echo "Rollback complete"
              cat /tmp/esteemcbt_deploy.log
              exit 1
            fi

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ EsteemCBT Deploy Successful"
          to: addatainsight@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: |
            EsteemCBT deployed successfully!

            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

            Services Status:
            ✅ Web app: Running
            ✅ Celery worker: Running
            ✅ Celery beat: Running
            ✅ Redis: Running

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ EsteemCBT Deploy FAILED - Rolled Back"
          to: addatainsight@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: |
            EsteemCBT deploy FAILED and was rolled back!

            Commit: ${{ github.sha }}
            Time: ${{ github.event.head_commit.timestamp }}
            Message: ${{ github.event.head_commit.message }}

            Check the GitHub Actions logs for full error details:
            https://github.com/Ahmed-Dauda/esteemcbt/actions