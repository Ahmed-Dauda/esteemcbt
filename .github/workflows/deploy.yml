name: Deploy to Hetzner

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /var/www/esteemcbt

            # Save last working commit
            LAST_WORKING=$(git rev-parse HEAD)
            echo $LAST_WORKING > /tmp/esteemcbt_last_working

            # Pull new code
            git fetch origin
            git reset --hard origin/development

            # Deploy with Docker
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            sleep 15

            # Check if app is running
            if docker compose ps | grep -q "Up"; then
              echo "Deploy successful"
              docker compose exec -T web python manage.py migrate --noinput
              docker compose exec -T web python manage.py collectstatic --noinput
              echo "Migration complete"

              # Send success email
              python3 -c "
              import smtplib
              from email.mime.text import MIMEText
              import os
              from dotenv import load_dotenv
              load_dotenv('/var/www/esteemcbt/.env')
              msg = MIMEText('EsteemCBT deployed successfully.')
              msg['Subject'] = '✅ EsteemCBT Deploy Successful'
              msg['From'] = os.getenv('DEFAULT_FROM_EMAIL')
              msg['To'] = os.getenv('DEFAULT_FROM_EMAIL')
              s = smtplib.SMTP('smtp.gmail.com', 587)
              s.starttls()
              s.login(os.getenv('EMAIL_HOST_USER'), os.getenv('EMAIL_HOST_PASSWORD'))
              s.send_message(msg)
              s.quit()
              print('Email sent')
              "
            else
              echo "Deploy failed - rolling back"
              git reset --hard $LAST_WORKING
              docker compose down
              docker compose up -d

              # Send failure email
              python3 -c "
              import smtplib
              from email.mime.text import MIMEText
              import os
              from dotenv import load_dotenv
              load_dotenv('/var/www/esteemcbt/.env')
              msg = MIMEText('EsteemCBT deploy FAILED. Rolled back to last working version.')
              msg['Subject'] = '❌ EsteemCBT Deploy FAILED - Rolled Back'
              msg['From'] = os.getenv('DEFAULT_FROM_EMAIL')
              msg['To'] = os.getenv('DEFAULT_FROM_EMAIL')
              s = smtplib.SMTP('smtp.gmail.com', 587)
              s.starttls()
              s.login(os.getenv('EMAIL_HOST_USER'), os.getenv('EMAIL_HOST_PASSWORD'))
              s.send_message(msg)
              s.quit()
              print('Email sent')
              "
              echo "Rollback complete"
            fi