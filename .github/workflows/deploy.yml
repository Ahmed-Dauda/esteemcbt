name: Deploy to Hetzner

on:
  push:
    branches:
      - development

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        id: deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /var/www/esteemcbt

            # Save last working commit
            LAST_WORKING=$(git rev-parse HEAD)
            echo $LAST_WORKING > /tmp/esteemcbt_last_working

            # Pull new code
            git fetch origin
            git reset --hard origin/development
            source venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            systemctl restart esteemcbt
            sleep 15

            # Check if app is running
            if systemctl is-active --quiet esteemcbt; then
              echo "Deploy successful"
            else
              echo "Deploy failed - rolling back"
              git reset --hard $LAST_WORKING
              systemctl restart esteemcbt
              echo "Rollback complete"
              exit 1
            fi

      - name: Send success email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ EsteemCBT Deploy Successful"
          to: addatainsight@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: "EsteemCBT deployed successfully on ${{ github.event.head_commit.timestamp }}. Commit: ${{ github.sha }}"

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ EsteemCBT Deploy FAILED - Rolled Back"
          to: addatainsight@gmail.com
          from: ${{ secrets.EMAIL_USER }}
          body: "EsteemCBT deploy FAILED and was rolled back to last working version. Commit: ${{ github.sha }}"