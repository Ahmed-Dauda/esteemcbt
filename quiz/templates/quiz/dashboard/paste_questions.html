{% extends 'sms/dashboard/teacherbase.html' %}
{% load static %}

{% block title %}Paste Questions{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
  body { font-family: Arial; }
  .form-section { max-width: 800px; margin: auto; }
  .form-group { margin-bottom: 15px; }
  label { display: block; font-weight: bold; margin-bottom: 5px; }
  input[type="text"], textarea, select { width: 100%; padding: 8px; }
  button { padding: 10px 20px; cursor: pointer; }
  .question-block { border: 1px solid #ddd; margin-bottom: 10px; padding: 10px; border-radius: 5px; }

  #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
  .toast-message { min-width: 250px; margin-bottom: 10px; padding: 12px 20px; border-radius: 5px;
    color: #fff; font-size: 14px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); opacity: 0.95;
    animation: fadein 0.5s, fadeout 0.5s 3.5s; }
  .toast-success { background-color: #28a745; }
  .toast-warning { background-color: #ffc107; color: #212529; }
  .toast-error   { background-color: #dc3545; }
  @keyframes fadein { from {opacity:0; transform:translateY(-20px);} to {opacity:0.95; transform:translateY(0);} }
  @keyframes fadeout { from {opacity:0.95;} to {opacity:0; transform:translateY(-20px);} }

  .btn-parse {
    padding: 12px 28px; background: #007bff; color: #fff;
    font-size: 15px; font-weight: bold; border: none;
    border-radius: 6px; cursor: pointer; min-width: 220px;
  }
  .btn-parse:disabled { opacity: 0.7; cursor: not-allowed; }

  .preview-course-wrap {
    background: #f0f7ff;
    border: 2px solid #007bff;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .preview-course-wrap label {
    color: #007bff;
    font-size: 13px;
    margin-bottom: 6px;
  }
</style>

<div id="toast-container"></div>

<div class="form-section">
  <h2>📋 Paste Questions</h2>
  <a href="{% url 'teacher:teacher_subjects' %}">
    <button type="button" class="btn-primary">View Questions</button>
  </a>

  <form id="paste-form" method="POST" style="margin-top: 20px;">
    {% csrf_token %}

    <div class="form-group">
      <label>Marks per Question:</label>
      <input type="number" id="marks" name="marks" value="1" min="1" max="1">
    </div>

    <div class="form-group">
      <label>Paste Your Questions & Answers:</label>
      <textarea id="raw_text" name="raw_text" rows="12"
        placeholder="Paste questions in any format — numbered, lettered options, inline answers, separate answer keys, etc."></textarea>
    </div>

    <div style="text-align:center;">
      <button type="submit" id="parse-btn" class="btn-parse">
        🔍 Parse Questions
      </button>
    </div>
  </form>

  <div id="preview-save-container" style="margin-top: 20px;"></div>
</div>

<script>
if (typeof jQuery == 'undefined') {
  document.write('<script src="https://code.jquery.com/jquery-3.6.0.min.js"><\/script>');
}
</script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
(function() {
  function init() {
    if (typeof jQuery === 'undefined') { setTimeout(init, 50); return; }
    var $ = jQuery;

    $(document).ready(function () {
      const csrftoken = '{{ csrf_token }}';
      const defaultCourseId = '{{ courses.first.id }}';

      function showMessage(message, type = 'success') {
        const toast = $(`<div class="toast-message toast-${type}">${message}</div>`);
        $('#toast-container').append(toast);
        setTimeout(() => toast.fadeOut(600, () => toast.remove()), 4000);
      }

      function escapeHtml(text) {
        if (!text) return '';
        return text.replaceAll("&","&amp;").replaceAll("<","&lt;")
                   .replaceAll(">","&gt;").replaceAll('"',"&quot;")
                   .replaceAll("'","&#039;");
      }

      // ── STEP 1: Parse ──
      $('#paste-form').on('submit', function (e) {
        e.preventDefault();

        const $btn = $('#parse-btn');
        $btn.prop('disabled', true).text('⏳ Parsing…');
        $('#preview-save-container').empty();

        const formData = new FormData();
        formData.append('csrfmiddlewaretoken', csrftoken);
        formData.append('action', 'parse');
        formData.append('raw_text', $('#raw_text').val());
        formData.append('course_id', defaultCourseId);

        fetch("{% url 'quiz:paste_questions' %}", {
          method: 'POST',
          body: formData,
          headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(r => r.json())
        .then(resp => {
          $btn.prop('disabled', false).text('🔍 Parse Questions');
          if (resp.status === 'success') {
            renderPreview(resp.questions, resp.course_id);
          } else {
            showMessage(resp.message, 'error');
          }
        })
        .catch(err => {
          console.error(err);
          $btn.prop('disabled', false).text('🔍 Parse Questions');
          showMessage('Error parsing questions.', 'error');
        });
      });

      // ── STEP 2: Render preview ──
      function renderPreview(questions, courseId) {
        if (!questions.length) {
          $('#preview-save-container').html('<p>No questions found.</p>');
          return;
        }

        const marks = $('#marks').val() || 1;

        // Build course options from Django template, pre-selecting defaultCourseId
        let courseOptions = '';
        {% for c in courses %}
          courseOptions += `<option value="{{ c.id }}" ${('{{ c.id }}' == courseId) ? 'selected' : ''}>{{ c.course_name }}</option>`;
        {% endfor %}

        let html = `
          <div class="form-section">
            <h3>✏️ Review Questions Before Saving</h3>
            <form id="preview-save-form" method="POST">
              <input type="hidden" name="confirm_save" value="1">
              <input type="hidden" name="total_questions" value="${questions.length}">
              <input type="hidden" name="marks" value="${marks}">

              <div class="preview-course-wrap">
                <label>💾 Save to Course: <span style="font-weight:normal; color:#555;">(change if needed before saving)</span></label>
                <select name="course_id" id="preview-course" style="width:100%; padding:8px;">
                  ${courseOptions}
                </select>
              </div>`;

        questions.forEach((q, i) => {
          const idx = i + 1;
          html += `
            <div class="question-block">
              <div class="form-group">
                <label>Question ${idx}</label>
                <textarea name="question_${idx}" rows="2">${escapeHtml(q.question)}</textarea>
              </div>
              <div class="form-group">
                <label>Option A:</label>
                <input type="text" name="option1_${idx}" value="${escapeHtml(q.option1)}">
              </div>
              <div class="form-group">
                <label>Option B:</label>
                <input type="text" name="option2_${idx}" value="${escapeHtml(q.option2)}">
              </div>
              <div class="form-group">
                <label>Option C:</label>
                <input type="text" name="option3_${idx}" value="${escapeHtml(q.option3)}">
              </div>
              <div class="form-group">
                <label>Option D:</label>
                <input type="text" name="option4_${idx}" value="${escapeHtml(q.option4)}">
              </div>
              <div class="form-group">
                <label>Correct Answer:</label>
                <select name="answer_${idx}">
                  <option value="Option1" ${q.answer==='Option1'?'selected':''}>A</option>
                  <option value="Option2" ${q.answer==='Option2'?'selected':''}>B</option>
                  <option value="Option3" ${q.answer==='Option3'?'selected':''}>C</option>
                  <option value="Option4" ${q.answer==='Option4'?'selected':''}>D</option>
                </select>
              </div>
            </div>`;
        });

        html += `
              <div style="text-align:center; margin-top:16px;">
                <button type="submit" id="save-btn" style="
                  padding:12px 28px; background:#28a745; color:#fff;
                  font-size:15px; font-weight:bold; border:none;
                  border-radius:6px; cursor:pointer; min-width:220px;">
                  ✅ Save All Questions
                </button>
                <div id="save-spinner" style="display:none; margin:14px auto 0;
                  width:36px; height:36px; border:4px solid #e0e0e0;
                  border-top:4px solid #28a745; border-radius:50%;"></div>
                <p id="save-spinner-text" style="display:none; margin-top:8px; color:#555; font-size:13px;">
                  Saving questions…
                </p>
              </div>
            </form>
          </div>`;

        $('#preview-save-container').html(html);

        // Init select2 on the preview course dropdown
        $('#preview-course').select2({ width: '100%' });

        // ── STEP 3: Save ──
        $('#preview-save-form').off('submit').on('submit', function (e) {
          e.preventDefault();

          const saveBtn     = document.getElementById('save-btn');
          const spinner     = document.getElementById('save-spinner');
          const spinnerText = document.getElementById('save-spinner-text');

          saveBtn.style.display     = 'none';
          spinner.style.display     = 'block';
          spinnerText.style.display = 'block';

          let deg = 0;
          const spinInterval = setInterval(() => {
            deg += 10;
            spinner.style.transform = `rotate(${deg}deg)`;
          }, 30);

          // Explicitly read from select2 and set it to guarantee correct value
          const selectedCourseId = $('#preview-course').val();
          const formData = new FormData(this);
          formData.set('course_id', selectedCourseId);
          formData.append('csrfmiddlewaretoken', csrftoken);

          fetch("{% url 'quiz:paste_questions' %}", {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
          })
          .then(r => r.json())
          .then(resp => {
            clearInterval(spinInterval);
            spinner.style.display     = 'none';
            spinnerText.style.display = 'none';
            showMessage(resp.message, resp.status || 'success');

            const badge = document.createElement('div');
            badge.innerHTML = '✅ Questions Saved!';
            badge.style.cssText = 'margin-top:12px; color:#28a745; font-weight:bold; font-size:15px;';
            spinner.parentNode.appendChild(badge);
          })
          .catch(err => {
            console.error(err);
            clearInterval(spinInterval);
            spinner.style.display     = 'none';
            spinnerText.style.display = 'none';
            saveBtn.style.display     = 'inline-block';
            showMessage('Error saving questions.', 'error');
          });
        });
      }
    });
  }
  init();
})();
</script>
{% endblock %}
