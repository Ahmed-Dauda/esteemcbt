{% extends 'sms/dashboard/studentbase.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-5 col-sm-8 col-11">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">

                    <!-- Header -->
                    <div class="text-center mb-4">
                        <div class="mb-3">
                            <span style="
                                display: inline-flex;
                                align-items: center;
                                justify-content: center;
                                width: 64px;
                                height: 64px;
                                background: linear-gradient(135deg, #4e73df, #224abe);
                                border-radius: 50%;
                                box-shadow: 0 4px 15px rgba(78,115,223,0.4);
                            ">
                                <i class="fas fa-user-graduate fa-2x text-white"></i>
                            </span>
                        </div>
                        <h4 class="font-weight-bold text-dark mb-1">Student Portal</h4>
                        <p class="text-muted small mb-0">Enter your username or email to access your exams</p>
                    </div>

                    <!-- Form -->
                    <form method="POST" action="{% url 'student:student-login' %}">
                        {% csrf_token %}

                        <div class="form-group mb-3">
                            <label for="username" class="text-muted small font-weight-bold text-uppercase mb-1">
                                Username or Email
                            </label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text bg-light border-right-0">
                                        <i class="fas fa-user text-muted"></i>
                                    </span>
                                </div>
                                <input
                                    type="text"
                                    name="username"
                                    id="username"
                                    class="form-control border-left-0 {% if error %}is-invalid{% endif %}"
                                    placeholder="Enter your username or email"
                                    required
                                    autofocus
                                    style="border-left: none;"
                                >
                            </div>
                            {% if error %}
                                <div class="invalid-feedback d-block mt-1">
                                    <i class="fas fa-exclamation-circle mr-1"></i>{{ error }}
                                </div>
                            {% endif %}
                        </div>

                        <button
                            type="submit"
                            class="btn btn-block btn-lg font-weight-bold mt-3"
                            style="
                                background: linear-gradient(135deg, #4e73df, #224abe);
                                color: #fff;
                                border: none;
                                border-radius: 8px;
                                padding: 12px;
                                letter-spacing: 0.5px;
                                box-shadow: 0 4px 15px rgba(78,115,223,0.4);
                                transition: opacity 0.2s;
                            "
                            onmouseover="this.style.opacity='0.9'"
                            onmouseout="this.style.opacity='1'"
                        >
                            <i class="fas fa-sign-in-alt mr-2"></i> Login to Exam Portal
                        </button>
                    </form>

                    <!-- Footer note -->
                    <p class="text-center text-muted small mt-4 mb-0">
                        <i class="fas fa-lock mr-1"></i> No password required for students
                    </p>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
