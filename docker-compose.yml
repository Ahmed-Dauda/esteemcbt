version: '3.8'

services:
  web:
    build: .
    image: ${IMAGE_NAME}
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DEBUG=${DEBUG:-False}
    volumes:
      - media_data:/app/media
    restart: unless-stopped

volumes:
  media_data: