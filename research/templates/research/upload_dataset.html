<div style="padding:30px;max-width:900px;margin:auto;">
  <h2>{{ dataset.name }}</h2>
  <p style="color:#6b7280;font-size:13px;">Uploaded {{ dataset.uploaded_at|date:"N j, Y, g:i a" }}</p>

  {% if error %}
    <div style="padding:12px;background:#fef2f2;border-radius:8px;color:#dc2626;margin-bottom:16px;">
      Could not read file: {{ error }}
    </div>
  {% endif %}

  {% if preview %}
    <h4 style="margin-bottom:8px;">Preview — first 10 rows</h4>
    <div style="overflow-x:auto;margin-bottom:24px;">{{ preview|safe }}</div>

    <h4 style="margin-bottom:8px;">Descriptive Statistics</h4>
    <div style="overflow-x:auto;">{{ stats|safe }}</div>
  {% endif %}

  <a href="{% url 'upload_dataset' project.id %}"
     style="display:inline-block;margin-top:20px;padding:8px 16px;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;">
    ← Upload Another File
  </a>
</div>
