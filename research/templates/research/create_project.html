{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>New Project – AI Project Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sora', sans-serif; background: #f5f6fa;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border: 1px solid #e8eaf0; border-radius: 16px;
      padding: 40px 36px; width: 100%; max-width: 440px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .brand-name { font-size: 16px; font-weight: 700; color: #111827; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .error-box {
      background: #fef2f2; border: 1.5px solid #fca5a5;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #dc2626; margin-bottom: 18px;
    }
    label { display: block; font-size: 12.5px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input, textarea {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e8eaf0; border-radius: 9px;
      font-family: 'Sora', sans-serif; font-size: 13.5px;
      color: #111827; background: #f9fafb; outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus { border-color: #2563eb; background: #fff; }
    textarea { resize: vertical; min-height: 80px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .hint { font-size: 11.5px; color: #9ca3af; margin-top: 5px; }
    .submit-btn {
      width: 100%; padding: 12px; border: none; border-radius: 9px;
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      color: #fff; font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    .submit-btn:hover { opacity: .9; }
    .back-link {
      display: block; text-align: center; margin-top: 16px;
      font-size: 13px; color: #6b7280; text-decoration: none;
    }
    .back-link:hover { color: #2563eb; }
  </style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-icon">🎓</div>
    <div class="brand-name">AI Project Studio</div>
  </div>

  <h1>New Project</h1>
  <p class="subtitle">Enter your research topic to get started.</p>

  {% if error %}<div class="error-box">⚠ {{ error }}</div>{% endif %}

  <form method="POST" action="{% url 'create_project' %}">
    {% csrf_token %}
    <div class="field">
      <label for="title">Project Title</label>
      <input type="text" id="title" name="title" required
             placeholder="e.g. Impact of Social Media on Student Academic Performance"
             value="{{ request.POST.title }}"/>
      <p class="hint">This will be used as your dissertation topic throughout.</p>
    </div>
    <div class="field">
      <label for="description">Brief Description <span style="color:#9ca3af;font-weight:400">(optional)</span></label>
      <textarea id="description" name="description"
                placeholder="A short summary of what your project is about…">{{ request.POST.description }}</textarea>
    </div>
    <button type="submit" class="submit-btn">Create Project →</button>
  </form>
  <a href="{% url 'home' %}" class="back-link">← Back to My Projects</a>
</div>
</body>
</html>
