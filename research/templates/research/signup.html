{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – AI Project Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f6fa;
    }

    .card {
      background: #fff;
      border: 1px solid #e8eaf0;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .brand-name  { font-size: 16px; font-weight: 700; color: #111827; }
    .brand-tagline { font-size: 11px; color: #9ca3af; }

    h1 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }

    .error-box {
      background: #fef2f2; border: 1.5px solid #fca5a5;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #dc2626;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }

    .field { margin-bottom: 16px; }
    label {
      display: block; font-size: 12.5px; font-weight: 600;
      color: #374151; margin-bottom: 6px;
    }
    input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e8eaf0; border-radius: 9px;
      font-family: 'Sora', sans-serif; font-size: 13.5px;
      color: #111827; background: #f9fafb;
      outline: none; transition: border-color .15s, background .15s;
    }
    input:focus { border-color: #2563eb; background: #fff; }
    input::placeholder { color: #d1d5db; }

    .submit-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff; border: none; border-radius: 9px;
      font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 8px; transition: opacity .15s, transform .15s;
    }
    .submit-btn:hover { opacity: .9; transform: translateY(-1px); }
    .submit-btn:active { transform: translateY(0); }

    .login-link {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: #6b7280;
    }
    .login-link a { color: #2563eb; font-weight: 600; text-decoration: none; }
    .login-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="brand-icon">🎓</div>
    <div>
      <div class="brand-name">AI Project Studio</div>
      <div class="brand-tagline">Your Academic Partner</div>
    </div>
  </div>

  <h1>Create account</h1>
  <p class="subtitle">Start writing your research project with AI.</p>

  {% if error %}
  <div class="error-box">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="{% url 'signup' %}">
    {% csrf_token %}

    <div class="field">
      <label for="first_name">First Name</label>
      <input type="text" id="first_name" name="first_name"
             placeholder="e.g. Amaka"
             value="{{ request.POST.first_name }}" required/>
    </div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="e.g. amaka123"
             value="{{ request.POST.username }}" required/>
    </div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email"
             placeholder="e.g. amaka@gmail.com"
             value="{{ request.POST.email }}" required/>
    </div>

    <div class="field">
      <label for="password1">Password</label>
      <input type="password" id="password1" name="password1"
             placeholder="Min. 8 characters" required/>
    </div>

    <div class="field">
      <label for="password2">Confirm Password</label>
      <input type="password" id="password2" name="password2"
             placeholder="Repeat your password" required/>
    </div>

    <button type="submit" class="submit-btn">Create Account →</button>
  </form>

  <p class="login-link">
    Already have an account? <a href="{% url 'login' %}">Log in</a>
  </p>
</div>

</body>
</html>
